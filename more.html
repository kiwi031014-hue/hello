<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠로야 굿즈 프로젝트</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #2B2624; /* 흑단나무 톤의 짙은 브라운 색상으로 변경 */
            color: #333;
            margin: 0;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 {
            color: #111;
        }
        .goods-img {
            width: 300px;
            height: 200px;
            background-color: #eee;
            margin: 20px auto;
            line-height: 200px;
            color: #888;
            border-radius: 5px;
            overflow: hidden; /* 이미지가 영역 밖으로 넘치지 않게 방지 */
        }
        .goods-img img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 영역에 맞게 이미지 예쁘게 꽉 채우기 */
        }
        /* 메인으로 돌아가기 버튼 스타일 추가 */
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            background-color: #2B2624;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .btn-back:hover {
            background-color: #413a37;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>경성대 쿠로야 굿즈 라인업</h1>
        <p>쿠로야의 아이덴티티를 담은 특별한 굿즈를 소개합니다.</p>
        
        <div class="goods-img">
            <img src="oya.png" alt="쿠로야 흑단나무 젓가락 세트">
        </div>
        
        <p>쿠로야 로고가 각인된 고급스러운 흑단나무 젓가락과 패키징</p>
        
        <a href="index.html" class="btn-back">← 메인으로 돌아가기</a>
    </div>

</body>
</html>
