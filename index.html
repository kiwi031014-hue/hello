<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠로야 굿즈 프로젝트 - 메인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #2B2624; /* 흑단나무 톤 배경 */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 세로 중앙 정렬을 위해 추가 */
        }
        .main-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        .logo-area {
            width: 100%;
            margin-bottom: 30px;
            overflow: hidden;
            border-radius: 8px;
        }
        .logo-area img {
            width: 100%;
            height: auto;
            display: block;
        }
        .btn-lineup {
            display: inline-block;
            background-color: #2B2624; /* 버튼도 흑단나무 톤으로 통일 */
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .btn-lineup:hover {
            background-color: #413a37; /* 마우스 올렸을 때 살짝 밝아지게 */
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-area">
            <img src="logo.jpg" alt="쿠로야 로고">
        </div>
        
        <a href="more.html" class="btn-lineup">굿즈 라인업 보러가기</a>
    </div>

</body>
</html>
